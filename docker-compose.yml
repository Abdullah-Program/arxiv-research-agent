# docker-compose.yml — ResearchForge AI
# Starts FastAPI backend + React frontend together
# Usage: docker-compose up --build

services:

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: researchforge-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: researchforge-ui
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

volumes:
  researchforge_data:
